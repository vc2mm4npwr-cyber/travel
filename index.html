<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>淡路島旅行2026 旅のしおり</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Noto+Sans+JP:wght@100..900&family=Noto+Serif+JP:wght@200..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">    
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
    </header>
<!-- 目次　-->
        
    <!--HERO-->
    <section class="hero">
        <div class="hero-inner">
            <h1 class=hero-title>
                <span>淡路島</span><br>
                <span> Family Trip</span>
            </h1>
            <div class="hero-meta">
            <p class="hero-date">March 12 - 13. 2026</p>
                <p class="hero-subtitle">淡路島で深呼吸</p>
            </div>
            <!--　一言テーマ　-->        
        </div>
    </section>

    <nav class="toc">
        <a href="#day1">Day1</a>
        <a href="#day2">Day2</a>
        <a href="#checklist">持ち物</a>
    </nav>


    <!--旅のテーマ-->
    <main>
        <section class="theme">
            <div class="container">
                <h2 class="section-title">Story</h2>
                <p class="theme-quote">「整う」旅</p>
            </div>
        </section>

    

    <!--1日目-->
        <section id="day1">
            <h2>Day 1</h2>
    <!-- タイムスケジュール（横並び）flex縦並び＋border-leftでタイムライン風-->
            <div class="schedule">
                <h3>スケジュール</h3>
                <ul>
                    <li>9:00 出発</li>
                    <li>11:00 花さじき</li>
                    <li>12:00 お昼ごはん</li>
                    <li>14:00 洲本城跡</li>
                    <li>15:00 チェックイン</li>
                    <li>（大浜海水浴場でお散歩）</li>
                </ul>
            </div>

            <div class="viewpoint-grid">
        
                <figure class="view-item">
                    <img src="images/hanasajiki.jpg" alt="花さじき" loading="lazy">

                    <figcaption class="spot-name">花さじき</figcaption>
                    <figcaption class="spot-desc">菜の花が見頃。黄色×海のコントラストがキレイ</figcaption>

                    <div class="spot-links">
                        <a href="https://maps.app.goo.gl/Qw7VXaxJyL2W8Etw8"
                            target="_blank" rel="noopener noreferrer">MAP
                        </a>
                    
                        <a href="https://awajihanasajiki.jp/"
                            target="_blank" rel="noopener noreferrer">公式
                        </a>
                    </div>
                </figure>
        

                <figure class="view-item">
                    <img src="images/sumotojyo.jpg" alt="洲本城跡" loading="lazy">

                    <figcaption class="spot-name">洲本城跡</figcaption>
                    <figcaption class="spot-desc">車で上まで行ける。天守台からの海の眺めがきれい</figcaption>

                    <div class="spot-links">
                        <a href="https://maps.app.goo.gl/bxEsgqsjnaRKx9c19"
                            target="_blank" rel="noopener noreferrer">MAP
                        </a>

                        <a href="https://www.awajishima-kanko.jp/manual/detail.html?bid=242"
                            target="_blank" rel="noopener noreferrer">公式
                        </a>
                    </div>
                </figure>


                <figure class="view-item">
                    <img src="images/oohama.jpg" alt="大浜海水浴場" loading="lazy">
                    <figcaption class="spot-name">大浜海水浴場</figcaption>
                    <figcaption class="spot-desc">抱っこ紐でお散歩。海風にあたってウトウト</figcaption>
                </figure>

            </div>
            

        </section>



    <!--2日目-->
        <section id="day2">
            <h2>Day 2</h2>
            <!-- タイムスケジュール（横並び）-->
            <div class="schedule">
                <h3>スケジュール</h3>
                <ul>
                    <li>10:00 チェックアウト</li>
                    <li>11:00 道の駅うずしお</li>
                    <li>13:30 慶野松原海水浴場</li>
                    <li>15:00 GARB COSTA ORANGE</li>
                </ul>
        
            </div>

            <div class="viewpoint-grid">
                <!--googlemapと公式サイトのURL貼り付ける-->
                <figure class="view-item">

                    <img src="images/uzusio.jpg" alt="道の駅うずしお" loading="lazy">

                    <figcaption class="spot-name">道の駅うずしお</figcaption>
                    <figcaption class="spot-desc">
                        鳴門海峡を見ながら休憩。名物の玉ねぎグルメ
                    </figcaption>

                    <div class="spot-links">
                        <a href="https://maps.app.goo.gl/iJFSg6Vq5ehvX4Bb6"
                            target="_blank" rel="noopener noreferrer">
                            MAP
                        </a>

                        <a href="https://eki.uzunokuni.com/"
                            target="_blank" rel="noopener noreferrer">
                            公式
                        </a>
                    </div>
                </figure>
        
                <figure class="view-item">
                    <img src="images/yoshinomatubara.jpg" alt="慶野松原海水浴場" loading="lazy">
                    <figcaption class="spot-name">慶野松原海水浴場</figcaption>
                    <figcaption class="spot-desc">松林×白砂×水平線</figcaption>
                </figure>

                <figure class="view-item">
                    <img src="images/orange.jpg" alt="GARB COSTA ORANGE" loading="lazy">
                    <figcaption class="spot-name">GARB COSTA ORANGE</figcaption>
                    <figcaption class="spot-desc">テラス席で旅の余韻を感じる</figcaption>
                </figure>

            </div>

        </section>



    <!--持ち物チェックリスト-->
        <section id="checklist">
            <h2>持ち物</h2>
            <h3>ゆめ</h3>
                <label><input type="checkbox">2日目の着替え</label><br>
                <label><input type="checkbox">パジャマ・スリーパー</label><br>
                <label><input type="checkbox">防寒具</label><br>
                <label><input type="checkbox">おむつ替え一式</label><br>
                <label><input type="checkbox">チェアサポート</label><br>
                <label><input type="checkbox">絵本・おしゃぶり・歯固め</label><br>
                <label><input type="checkbox">お風呂・保湿一式</label><br>
                <label><input type="checkbox">離乳食・飲み物</label>
        </section>

    </main>


    <script src="script.js"></script>
</body>
</html>
